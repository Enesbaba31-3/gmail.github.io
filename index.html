<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>81 İl Lezzetleri – Türkiye'nin Yemek Rehberi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
</head>
<body>
    <!-- HEADER -->
    <header class="header" id="header">
        <div class="container">
            <div class="header-flex">
                <div class="logo">
                    <span class="logo-icon">🍽️</span>
                    <h1>81 <span>Lezzet</span></h1>
                </div>
                <div class="header-controls">
                    <button class="theme-toggle" id="themeToggle" aria-label="Tema değiştir">🌙</button>
                    <button class="fav-toggle" id="favToggle" aria-label="Favoriler">❤️ <span id="favCount">0</span></button>
                </div>
            </div>
            <!-- Arama -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="İl, yemek veya malzeme ara...">
                <span class="search-icon">🔍</span>
            </div>
            <!-- Kategori Filtreleri -->
            <div class="category-filter" id="categoryFilter">
                <button class="cat-btn active" data-cat="all">Tümü</button>
                <button class="cat-btn" data-cat="corba">Çorba</button>
                <button class="cat-btn" data-cat="kebap">Kebap</button>
                <button class="cat-btn" data-cat="hamur">Hamur İşi</button>
                <button class="cat-btn" data-cat="tatli">Tatlı</button>
                <button class="cat-btn" data-cat="et">Et Yemekleri</button>
                <button class="cat-btn" data-cat="sebze">Sebze</button>
                <button class="cat-btn" data-cat="deniz">Deniz Ürünleri</button>
            </div>
        </div>
    </header>

    <!-- ANA İÇERİK -->
    <main class="main">
        <div class="container">
            <!-- İl Kartları Grid -->
            <div class="city-grid" id="cityGrid">
                <!-- JavaScript tarafından doldurulacak -->
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p>🍽️ 81 İl Lezzetleri – 2026 · Tüm tarifler özgün ve yöreseldir.</p>
        </div>
    </footer>

    <!-- MODAL (Detay sayfası) -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <span class="modal-close" id="modalClose">&times;</span>
            <div id="modalBody">
                <!-- JS ile doldurulacak -->
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
