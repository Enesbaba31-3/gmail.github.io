<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Tahminci - 20 Soru Oyunu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #00f2fe;
        }
        .box {
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            margin-bottom: 20px;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        button {
            background: #00f2fe;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            color: #1e3c72;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.6);
        }
        button.no {
            background: #ff4757;
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }
        button.no:hover {
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.6);
        }
        button.restart {
            background: #2ed573;
            color: #fff;
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4);
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>Akıllı Tahminci</h1>
    <div class="box" id="game-box">
        <p>Aklından bir nesne veya canlı tut! Hazırsan başlayalım.</p>
    </div>
    <div class="btn-container" id="btn-box">
        <button onclick="startGame()">Oyunu Başlat</button>
    </div>
</div>

<script>
// Sınırsız veri ekleyebileceğiniz Karar Ağacı (Data) veri yapısı
// "text": Soru veya Tahmin cümlesi
// "yes": Evet denirse gidilecek yeni nesne/soru düğümü
// "no": Hayır denirse gidilecek yeni nesne/soru düğümü
const gameState = {
    text: "Tuttuğun şey bir canlı mı?",
    yes: {
        text: "Bu bir hayvan mı?",
        yes: {
            text: "Evde beslenebilir mi?",
            yes: {
                text: "Miyavlar mı?",
                yes: { text: "Tuttuğun şey: KEDİ! 🐱" },
                no: { text: "Tuttuğun şey: KÖPEK! 🐶" }
            },
            no: {
                text: "Uçabiliyor mu?",
                yes: { text: "Tuttuğun şey: KARTAL! 🦅" },
                no: { text: "Tuttuğun şey: ASLAN! 🦁" }
            }
        },
        no: {
            text: "Toprakta mı yetişir?",
            yes: {
                text: "Bir ağaçta mı büyür?",
                yes: { text: "Tuttuğun şey: ELMA! 🍎" },
                no: { text: "Tuttuğun şey: PAPATYA! 🌼" }
            },
            no: { text: "Tuttuğun şey: BAKTERİ! 🦠" }
        }
    },
    no: {
        text: "Elektronik bir cihaz mı?",
        yes: {
            text: "Cebe sığacak kadar küçük mü?",
            yes: { text: "Tuttuğun şey: CEP TELEFONU! 📱" },
            no: { text: "Tuttuğun şey: BİLGİSAYAR! 💻" }
        },
        no: {
            text: "Mutfakta kullanılan bir şey mi?",
            yes: {
                text: "Sıvı tüketmek için mi kullanılır?",
                yes: { text: "Tuttuğun şey: BARDAK! 🥛" },
                no: { text: "Tuttuğun şey: ÇATAL! 🍴" }
            },
            no: { text: "Tuttuğun şey: ARABA! 🚗" }
        }
    }
};

let currentNode = null;

function startGame() {
    currentNode = gameState;
    showNode();
}

function showNode() {
    const gameBox = document.getElementById('game-box');
    const btnBox = document.getElementById('btn-box');
    
    gameBox.innerHTML = `<p>${currentNode.text}</p>`;
    
    // Eğer gidilecek alt seçenek (yes/no) yoksa bu bir tahmindir (Sonuç ekranı)
    if (!currentNode.yes && !currentNode.no) {
        btnBox.innerHTML = `<button class="restart" onclick="startGame()">Yeniden Oyna</button>`;
    } else {
        btnBox.innerHTML = `
            <button onclick="handleAnswer('yes')">Evet</button>
            <button class="no" onclick="handleAnswer('no')">Hayır</button>
        `;
    }
}

function handleAnswer(answer) {
    if (answer === 'yes' && currentNode.yes) {
        currentNode = currentNode.yes;
    } else if (answer === 'no' && currentNode.no) {
        currentNode = currentNode.no;
    }
    showNode();
}
</script>

</body>
</html>
